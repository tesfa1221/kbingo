services:
  - type: web
    name: k-bingo-server
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        value: defaultdb
      - key: DB_SSL
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: HOUSE_FEE_PERCENT
        value: "20"
      - key: BAN_DURATION_MINUTES
        value: "30"
      - key: CORS_ORIGIN
        sync: false
      - key: RENDER_EXTERNAL_URL
        fromService:
          type: web
          name: k-bingo-server
          property: host
